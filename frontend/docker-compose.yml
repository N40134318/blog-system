services:
  frontend:
    image: blog-frontend:dev
    build:
      context: .
    container_name: blog-frontend-dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - blog_frontend_node_modules:/workspace/node_modules
      - blog_frontend_nuxt:/workspace/.nuxt
    environment:
      CI: "true"
    ports:
      - "127.0.0.1:3000:3000"
    command: sh -c "pnpm install --no-frozen-lockfile && pnpm dev --host 0.0.0.0 --port 3000"
    restart: always

volumes:
  blog_frontend_node_modules:
  blog_frontend_nuxt:
