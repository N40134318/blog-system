name: Deploy Preview

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy preview to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd /opt/devplatform/projects/blog-system

            git config --global --add safe.directory /opt/devplatform/projects/blog-system || true
            git pull origin main

            docker compose -f deploy/compose.dev.yml up -d --build

            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:8081/actuator/health; then
                break
              fi
              sleep 2
            done

            curl -fsS http://127.0.0.1:8081/actuator/health
            curl -fsSI http://127.0.0.1:3001

            echo "[INFO] Preview deploy success"
